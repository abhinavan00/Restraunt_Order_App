<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- GOOGLE FONT -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
        
        <!-- CSS Styelsheet -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Jimmy’s Diner</h1>
            <h3>The best burgers and pizzas in town.</h3> 
        </header>
        <main >
            <section id="items-container"></section>

            <section class="checkout-section" id="checkout-section">
                <p class="checkout-head">Your Order</p>
                <div class="selected-items-container" id="selected-items-container">
                    
                </div>
                <div class="total-price-container">
                    <p class="total-price">Total price:</p>
                    <p>$<span id="total-value">0</span></p>
                </div>
                <button class="checkout-btn">Complete order</button>
            </section>
        </main>
        <form class="payment-modal" id="payment-modal">
            <p class="modal-heading">Enter card details</p>
            <input 
                type="text" 
                placeholder="Enter your name"
                aria-label="Enter your full name"
            >
            <input 
                type="number"
                placeholder="Enter card number"
                pattern="[0-9]{16}" 
                aria-label="Enter card number"
            >
            <input 
                type="number"
                placeholder="Enter CVV"
                pattern="[0-9]{3}"
            >
            <button type="submit">Pay</button>
        </form>
        <script src="index.js" type="module"></script>
    </body>
</html>
